baseURL: 'https://electq.github.io/'
title: '东雲研究所'
theme: 'PaperMod'
defaultContentLanguage: 'zh-cn'

languages:
  zh-cn:
    label: '简体中文'
    weight: 1

permalinks:
  posts: "/:slug/"

menu:
  main:
    - name: 首页
      url: /
      weight: 10
    - name: 文章
      url: /posts/
      weight: 20
    - name: 标签
      url: /tags/
      weight: 30
    - name: 归档
      url: /archives/
      weight: 40

imaging:
  quality: 75
  resampleFilter: "Lanczos"

params:
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowToc: true
  ShowBreadCrumbs: true

  homeInfoParams:
    Title: "你好，欢迎来访"
    Content: "这里是东雲研究所，记录学习与生活"

  socialIcons:
    - name: github
      url: "https://github.com/electq"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  cover:
    linkFullImages: true